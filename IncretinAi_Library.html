<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0C2340">
<title>IncretinA i · 라이브러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --teal:#1A6B68; --teal-light:#2A8B86; --teal-dark:#0F4D4A;
    --navy:#0C2340; --gold:#C49A3C; --gold-light:#E4BE5C;
    --bg:#F5F4F1; --surface:#FFFFFF; --surface-2:#FAFAF7;
    --text:#0C2340; --muted:#6B7280; --line:#E5E3DD;
    --green:#10B981; --orange:#F59E0B;
    --shadow-sm:0 1px 2px rgba(12,35,64,.06);
    --shadow-md:0 4px 12px rgba(12,35,64,.08);
    --shadow-lg:0 12px 32px rgba(12,35,64,.12);
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased}
  body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:32px}
  .display{font-family:'Outfit',sans-serif;letter-spacing:-.02em}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

  /* Header */
  .header{position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 20px 12px;border-bottom:1px solid transparent;transition:border-color .2s}
  .header.scrolled{border-color:var(--line);box-shadow:0 1px 0 rgba(12,35,64,.04)}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--text);flex-shrink:0;transition:transform .15s}
  .back-btn:active{transform:scale(.92)}
  .back-btn svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none}
  .header-title{flex:1;min-width:0}
  .header-title h1{font-family:'Outfit';font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .header-title p{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}

  /* Tabs */
  .tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:9px 16px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .tab:active{transform:scale(.96)}
  .tab-badge{font-size:10px;background:rgba(255,255,255,.18);padding:1px 6px;border-radius:999px;font-weight:700}
  .tab:not(.active) .tab-badge{background:var(--bg);color:var(--muted)}

  /* Filters */
  .filters{padding:14px 20px 0;display:flex;gap:6px;flex-wrap:wrap}
  .filter{padding:6px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
  .filter.active{background:var(--teal);color:#fff;border-color:var(--teal)}
  .filter:active{transform:scale(.96)}

  /* Section */
  .content{padding:18px 20px 24px}
  .panel{display:none}
  .panel.active{display:block}

  /* Recipe card */
  .recipe-grid{display:flex;flex-direction:column;gap:10px}
  .rcard{background:var(--surface);border-radius:16px;padding:14px;border:1px solid var(--line);cursor:pointer;transition:all .15s;display:flex;gap:12px;align-items:flex-start}
  .rcard:hover{box-shadow:var(--shadow-md);border-color:var(--teal)}
  .rcard:active{transform:scale(.99)}
  .rcard-emoji{font-size:30px;line-height:1;flex-shrink:0;width:42px;text-align:center;padding-top:2px}
  .rcard-body{flex:1;min-width:0}
  .rcard-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:3px}
  .rcard-sub{font-size:11px;color:var(--muted);line-height:1.3;margin-bottom:7px}
  .rcard-stats{display:flex;gap:8px;flex-wrap:wrap;font-size:11px}
  .rstat{display:inline-flex;align-items:center;gap:3px;color:var(--muted);font-weight:600}
  .rstat-p{color:var(--teal)}
  .rstat-glp{color:var(--gold);letter-spacing:1px}
  .rcard-right{flex-shrink:0;text-align:right;font-size:11px;color:var(--muted)}

  /* Detail view */
  .detail{display:none;padding:18px 20px 32px}
  .detail.active{display:block}
  .detail-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .detail-emoji{font-size:48px;line-height:1;flex-shrink:0}
  .detail-title{flex:1}
  .detail-title h2{font-family:'Outfit';font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.15;color:var(--text)}
  .detail-title p{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.4}
  .detail-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .dstat{padding:6px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--text);display:inline-flex;align-items:center;gap:5px}
  .dstat.beta{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--navy);border-color:var(--gold)}

  .detail-section{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--line)}
  .ds-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .ds-text{font-size:14px;line-height:1.65;color:var(--text)}
  .ds-text.serif{font-family:'Outfit',sans-serif}

  /* β_seq steps */
  .seq-steps{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .seq-step{display:flex;gap:12px;padding:12px;background:var(--bg);border-radius:12px;border:1px solid transparent;transition:all .15s;cursor:pointer}
  .seq-step:hover{border-color:var(--teal)}
  .seq-step.done{background:rgba(26,107,104,.08);border-color:var(--teal)}
  .seq-num{width:28px;height:28px;border-radius:50%;background:var(--surface);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-size:13px;font-weight:800;flex-shrink:0;color:var(--muted)}
  .seq-step.done .seq-num{background:var(--teal);border-color:var(--teal);color:#fff}
  .seq-step-body{flex:1;min-width:0}
  .seq-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
  .seq-desc{font-size:11px;color:var(--muted);line-height:1.4}
  .seq-imem{display:inline-block;margin-top:4px;font-size:10px;color:var(--gold);font-weight:700;background:rgba(196,154,60,.12);padding:2px 8px;border-radius:999px}

  /* Empty/Loading */
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty-emoji{font-size:48px;margin-bottom:12px;opacity:.5}
  .empty-text{font-size:14px}

  /* Footer link */
  .footer-bar{margin:32px 20px 0;padding:16px;background:var(--surface);border-radius:14px;border:1px solid var(--line);text-align:center}
  .footer-bar h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px}
  .footer-bar p{font-size:11px;color:var(--muted);line-height:1.5}
  .footer-bar a{color:var(--teal);font-weight:700;text-decoration:none}

  /* Fade-in animation */
  .fade-in{animation:fadeIn .3s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Abbreviation expansion — 약자 하단에 작은 폰트로 full name */
  ruby.abbr{ruby-position:under;-webkit-ruby-position:under;text-underline-position:under;display:inline-flex;flex-direction:column;align-items:center;vertical-align:baseline;line-height:1.15;margin:0 1px}
  ruby.abbr rt{font-size:8.5px;font-weight:500;color:var(--muted);letter-spacing:-.01em;opacity:.85;display:block;text-align:center;white-space:nowrap;margin-top:1px;line-height:1}
  ruby.abbr rp{display:none}
  /* 줄간격이 좁은 컨테이너에서 약자 라벨이 잘리지 않도록 */
  .ds-text,.rcard-sub,.seq-desc,.dstat{line-height:1.7}
</style>
</head>
<body>

<header class="header" id="header">
  <div class="header-top">
    <a class="back-btn" href="javascript:history.length>1?history.back():window.close()" aria-label="뒤로"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    <div class="header-title">
      <h1>📚 라이브러리</h1>
      <p id="header-sub">레시피 · 가이드 · 인크레틴 과학</p>
    </div>
  </div>
  <div class="tabs">

    <div class="tab" data-tab="bseq" onclick="goTab('bseq')">🥗 본식 순서 <span class="tab-badge">10</span></div>

<!-- ── PRELOAD PANEL ── -->
<div class="panel active" id="panel-preload">

<!-- ── β_seq PANEL ── -->
<div class="panel" id="panel-bseq">
  <div class="filters" id="bseq-filters">
    <div class="filter active" data-cat="all" onclick="setBseqFilter('all')">전체</div>
    <div class="filter" data-cat="home" onclick="setBseqFilter('home')">🏠 집밥</div>
    <div class="filter" data-cat="out" onclick="setBseqFilter('out')">🏪 외식</div>
  </div>
  <div class="content"><div class="recipe-grid" id="bseq-list"></div></div>
</div>

<!-- ── SCIENCE PANEL ── -->
<div class="panel" id="panel-science">
  <div class="content"><div class="recipe-grid" id="science-list"></div></div>
</div>

<!-- ── DETAIL PANEL ── -->
<div class="detail" id="detail-view"></div>

<div class="footer-bar" id="footer-bar">
  <h3>인크레티나 아이 라이브러리 v1</h3>

</div>

  {id:4,emoji:'🚶',name:'식후 산책의 메타볼릭 효과',sub:'10분 걷기가 만드는 차이',
    body:`<p>식사 직후 가벼운 산책(10~20분)이 혈당 관리에 미치는 효과는 운동학 분야에서 잘 입증되어 있습니다.</p>
<p><b>기전</b>: 근육 수축 시 인슐린과 독립적으로 GLUT-4 단백질이 세포막으로 이동 → 혈중 글루코스를 근육이 직접 흡수. 식후 30분 이내 산책 시 혈당 피크를 30% 감소시킬 수 있습니다.</p>
<p><b>핵심 시간</b>: 식사 종료 후 10~20분 이내. 너무 늦으면(60분+) 이미 혈당 피크가 지나가 효과 감소.</p>
<p><b>강도</b>: 격렬할 필요 없음. 평지에서 평소 속도로 10~20분 걷기로 충분.</p>`,
    refs:'Reynolds AN et al. (Diabetologia 2016); Buffey AJ et al. (Sports Medicine 2022); DiPietro L et al. (Diabetes Care 2013).'},
  {id:5,emoji:'⚖️',name:'"천연 위고비"의 과학적 진실',sub:'SNS 트렌드와 IMEM의 차이',
    body:`<p>SNS에서 유행하는 <b>"천연 위고비"</b>(달걀+올리브오일을 식전에 섭취)는 실제로 GLP-1 분비를 자극합니다. 단, 위고비(세마글루타이드)와는 다음과 같이 다릅니다:</p>
<p><b>위고비</b>: 합성 GLP-1 유사체. 효력 강력하지만 처방·주사 필요. 부작용 가능성.</p>
<p><b>천연 위고비(=β_pre)</b>: 자체 GLP-1을 단기 자극. 효력은 위고비보다 약하지만 <b>안전</b>하고 <b>매일 실천 가능</b>.</p>
<p>인크레티나 아이는 이 β_pre를 <b>α(타이밍) × β(시퀀스) × γ(민감도)</b> 와 함께 조합하여 매일의 대사 효율을 최적화합니다. "천연 위고비"는 IMEM의 한 요소(β_pre)일 뿐 — 전체 시스템이 더 강력합니다.</p>`,
    refs:'세마글루타이드 작용기전(NEJM 2017); β_pre 임상 근거(Diabetes Care 2018); IMEM 통합 프로토콜은 인크레티나 아이 특허 출원 중.'},
  {id:6,emoji:'💊',name:'GLP-1이 체중 감량에 도움이 되는 이유',sub:'위고비가 효과 있는 4가지 기전',
    body:`<p>GLP-1은 <b>장에서 분비되는 호르몬</b>이지만, 그 작용은 뇌·위·췌장·지방조직 전체에 미칩니다. 체중 감량에 기여하는 핵심 기전 4가지:</p>
<p><b>① 식욕 억제</b> — 시상하부 활꼴핵(arcuate nucleus)의 POMC 뉴런을 활성화하고 NPY/AgRP 뉴런을 억제 → "배부르다" 신호 강화. 위고비 임상에서 평균 일일 칼로리 -700kcal 감소(STEP-1, NEJM 2021).</p>
<p><b>② 위 배출 속도 감소</b> — 위에서 소장으로 음식이 넘어가는 속도를 늦춰 포만감을 2~4시간 지속. 자연 GLP-1도 식사 직후 30~60분간 동일한 효과를 냄.</p>
<p><b>③ 혈당 안정화</b> — 췌장 β세포의 인슐린 분비를 글루코스 농도에 비례하여 자극(=glucose-dependent) → 저혈당 위험 없이 식후 혈당 스파이크 차단. 동시에 글루카곤 분비도 억제.</p>
<p><b>④ 지방 산화 우선</b> — 인슐린 농도가 낮게 유지되면서 호르몬민감지질분해효소(HSL) 활성 → 체지방 분해 모드 진입.</p>
<p><b>인크레티나 아이의 접근</b>: 외부 GLP-1을 주사하는 대신, β_pre·β_seq·α 타이밍으로 <b>내인성 GLP-1 분비를 매일 매끼 최적화</b>합니다. 위고비만큼은 아니지만, 부작용 없이 평생 지속 가능한 방식입니다.</p>`,
    refs:'Wilding JPH et al. (NEJM 2021, STEP-1 trial); Drucker DJ (Cell Metabolism 2018); Müller TD et al. (Molecular Metabolism 2019, GLP-1 review).'},
  {id:7,emoji:'💉',name:'GLP-1 주사를 끊으면 요요가 오는 이유',sub:'중단 후 1년 내 체중 66% 회복의 메커니즘',
    body:`<p>GLP-1 주사(위고비·삭센다·마운자로)는 강력하지만, <b>중단하면 평균 1년 내 잃은 체중의 2/3가 돌아옵니다</b> (STEP-1 extension, Diabetes Obes Metab 2022). 그 이유:</p>
<p><b>① 내인성 GLP-1 분비 회로 위축</b> — 외부 GLP-1이 충분히 공급되면 자체 분비 신호가 약화. 약을 끊는 순간 기저 GLP-1 농도가 평소보다도 더 낮아짐.</p>
<p><b>② 시상하부 식욕 조절 회로 원상복귀</b> — 약물이 누르고 있던 식욕 신호(NPY/AgRP)가 다시 활성화 → "참고 있던" 식욕이 폭발.</p>
<p><b>③ 근육 손실에 의한 기초대사율 저하</b> — 급격한 체중 감량 시 손실량의 25~40%가 근육. 근육이 줄면 BMR이 떨어져 같은 양을 먹어도 더 쉽게 살찜.</p>
<p><b>④ 인크레틴 수용체 민감도 변화</b> — 장기간 외부 자극에 노출된 수용체가 일시적으로 둔화. 자체 GLP-1에 대한 반응도 약해짐.</p>
<p><b>인크레티나 아이의 해법</b>: γ 계수는 인크레틴 <b>수용체 민감도</b>를 측정합니다. 운동·장 건강·수면을 통한 γ 회복은 약물 중단 후에도 GLP-1 효과를 자체적으로 유지하는 핵심 전략입니다. SyncRx 트랙의 δ Modifier는 약물 이력을 반영해 회복 곡선을 개인화합니다.</p>`,
    refs:'Wilding JPH et al. (Diabetes Obes Metab 2022, STEP-1 extension); Aronne LJ et al. (JAMA 2024, SURMOUNT-4); Cava E et al. (Adv Nutr 2017, 근손실 데이터).'},
  {id:8,emoji:'🌙',name:'인크레틴 호르몬 일주기 과학',sub:'같은 음식, 다른 시간 — 왜 다르게 살찌는가',
    body:`<p>인체의 인크레틴 분비와 인슐린 감수성은 <b>24시간 주기로 변동</b>합니다. 같은 700kcal 식사도 시간대에 따라 체중 변화 효과가 다른 이유:</p>
<p><b>아침(06~10시)</b> — 코르티솔 자연 상승과 동기화되어 GLP-1·GIP 분비 피크. 인슐린 감수성도 가장 높음. 같은 탄수화물도 혈당 스파이크가 30% 낮음(Jakubowicz, Obesity 2013).</p>
<p><b>점심(11~14시)</b> — GLP-1 분비는 유지되나 GIP 분비 비율이 증가. GIP는 지방 저장 신호도 동반하므로 시퀀스(β_seq) 적용이 더 중요해짐.</p>
<p><b>저녁(17~19시)</b> — 인슐린 감수성 점차 감소 시작. 골든타임의 마지막 구간.</p>
<p><b>야간(20시 이후)</b> — 멜라토닌 분비 시작 → 췌장 β세포의 인슐린 분비 능력 <b>30% 감소</b>. 같은 식사도 야식이면 체중 증가량이 1.5~2배(Garaulet, Int J Obes 2013).</p>
<p><b>수면과 호르몬</b> — 수면 부족(<6h) 시: GLP-1 분비 22% 저하 + 그렐린(공복 호르몬) 28% 상승 + 렙틴(포만 호르몬) 18% 감소. 한밤중 식욕 폭발의 과학적 원인.</p>
<p><b>인크레티나 아이의 α 계수</b>: 식사 시점을 일주기 리듬과 비교해 0.85~1.10 범위로 계산. Bio-Sync 타이머가 "골든타임"으로 시각화하는 이유입니다.</p>`,
    refs:'Jakubowicz D et al. (Obesity 2013, 아침식사 vs 저녁식사); Garaulet M et al. (Int J Obes 2013, 식사 타이밍과 체중 감량); Spiegel K et al. (Ann Intern Med 2004, 수면-식욕 호르몬); Lindgren O et al. (J Clin Endocrinol Metab 2009, GLP-1 일주기).'},
  {id:9,emoji:'🏋️',name:'GLP-1 호르몬 부스터 생활습관',sub:'약 없이 GLP-1을 끌어올리는 5가지',
    body:`<p>주사 없이도 내인성 GLP-1을 높이는 생활습관 5가지 — 모두 인크레티나 아이의 10개 루틴에 녹아 있습니다.</p>
<p><b>① 운동 (γ 직접 자극)</b> — HIIT와 중강도 유산소는 운동 후 <b>L세포의 GLP-1 분비 +27%</b>, 수용체 감수성 +30% (Martins et al., J Endocrinol 2007). 근력운동은 GLP-1 수용체 발현 자체를 증가시킴.</p>
<p><b>② 수면 7~9시간 (호르몬 균형)</b> — 수면이 충분하면 GLP-1·렙틴 회로가 정상화되고 그렐린이 억제됨. 수면 1시간 부족 = 일일 칼로리 +200kcal 자동 증가.</p>
<p><b>③ 장 건강 (L세포 밀도)</b> — 프로바이오틱스(특히 Akkermansia muciniphila)는 장 내벽의 L세포 밀도를 증가시켜 기저 GLP-1 분비량 자체를 끌어올림(Plovier et al., Nat Med 2017).</p>
<p><b>④ 스트레스 관리 (코르티솔 차단)</b> — 만성 스트레스 → 코르티솔 만성 상승 → 인슐린 저항성 → GLP-1 효과 둔화. 호흡·명상·산책 10분만으로도 차단 가능.</p>
<p><b>⑤ 아침 햇빛 노출 (세로토닌→포만감)</b> — 기상 후 10분 직사광 노출은 세로토닌 분비를 자극 → 식욕 조절 회로(시상하부) 정상화. 동시에 멜라토닌 리듬이 맞춰져 밤의 인슐린 능력도 보존.</p>
<p><b>인크레티나 아이 매핑</b>: 루틴 1(생체리듬), 2(커피), 3(14h 단식), 7(근력운동), 9(멜라토닌 세이프가드)는 모두 γ를 올리는 설계. 단순한 습관 체크리스트가 아니라 <b>GLP-1 부스터 프로토콜</b>입니다.</p>`,
    refs:'Martins C et al. (J Endocrinol 2007, 운동과 GLP-1); Plovier H et al. (Nat Med 2017, Akkermansia); Spiegel K et al. (Ann Intern Med 2004, 수면-식욕); Wehrens SMT et al. (Curr Biol 2017, 햇빛-대사 리듬).'},
  {id:10,emoji:'🔥',name:'인슐린 저항성이 살찌는 진짜 이유',sub:'고인슐린·인크레틴 둔화의 악순환',
    body:`<p>"열심히 운동하고 적게 먹는데도 살이 안 빠진다" — 대부분 인슐린 저항성이 원인입니다. 그 메커니즘:</p>
<p><b>① 인슐린 저항성 = 세포가 인슐린을 잘 듣지 않음</b> — 같은 혈당을 처리하려면 더 많은 인슐린이 필요. 췌장이 과로하며 만성 고인슐린 상태로 진입.</p>
<p><b>② 고인슐린 = 지방 저장 모드 ON</b> — 인슐린은 지방세포의 LPL(lipoprotein lipase)을 활성화하고 HSL(hormone-sensitive lipase)을 억제 → <b>지방 저장은 가속, 지방 분해는 정지</b>. 같은 칼로리를 먹어도 더 많이 저장됨.</p>
<p><b>③ 인크레틴 효과 둔화</b> — 인슐린 저항성 환자는 GLP-1·GIP에 대한 반응도 약해짐(incretin effect 50% 감소, Nauck, Diabetologia 1986). 자연 GLP-1을 분비해도 효과가 적음.</p>
<p><b>④ 악순환</b> — 살이 찜 → 내장지방 증가 → 염증 사이토카인 → 인슐린 저항성 악화 → 더 살찜.</p>
<p><b>γ 계수의 의미</b>: 인크레티나 아이의 <b>γ(인크레틴 민감도)</b> 계수는 이 인슐린 저항성의 역수에 가깝습니다. γ가 높으면 같은 GLP-1 분비량으로 더 큰 효과를 봄. 운동·14h 단식·고섬유 식단은 모두 γ를 올리는 개입.</p>
<p><b>위험 요인 연결</b>: R-01(야식), R-04(고탄수 폭식), R-06(가공식품)이 γ를 낮추는 인자로 정의된 것은 이들이 모두 인슐린 저항성을 직접 악화시키기 때문입니다.</p>`,
    refs:'Nauck MA et al. (Diabetologia 1986, incretin effect 감소); Kahn SE et al. (Nature 2006, 인슐린 저항성과 비만); DeFronzo RA (Diabetes Care 2009).'},
  {id:11,emoji:'⏰',name:'공복 14시간이 특별한 이유',sub:'AMPK 활성화와 인크레틴 리셋',
    body:`<p>인크레티나 아이의 루틴 3번 "14h 단식 해제"는 단순한 IF(간헐적 단식)가 아닙니다. <b>인크레틴 시스템을 매일 리셋하는 프로토콜</b>입니다.</p>
<p><b>0~12시간 (위장 비우기)</b> — 마지막 식사의 글리코겐이 점차 소진. 인슐린 농도는 기저선으로 하강.</p>
<p><b>12~14시간 (대사 스위치)</b> — 간 글리코겐 고갈 → <b>지방산화 모드 전환</b>. 케톤체 생성 시작. 인슐린은 최저 농도.</p>
<p><b>14시간 (AMPK 활성화 임계)</b> — 세포 내 에너지 센서 AMPK가 활성화 → 미토콘드리아 생합성 + 세포 자가포식(autophagy) 시작. 손상된 인슐린 수용체와 GLP-1 수용체가 청소·재생됨.</p>
<p><b>인크레틴 수용체 민감도 회복</b> — 단식 구간 동안 GLP-1·GIP 수용체가 재감작(re-sensitization)되어, 단식 해제 후 첫 식사의 인크레틴 반응이 평소보다 강해짐. 이게 14시간 공복 후 첫 식사가 특히 포만감이 좋은 이유.</p>
<p><b>HSL 활성화</b> — 저인슐린 구간 = 호르몬민감지질분해효소 활성 = 체지방 분해 모드. 14시간 공복이 매일 반복되면 누적 효과로 체중 감량.</p>
<p><b>주의</b>: 18시간 이상 단식은 코르티솔 상승과 근손실 위험. 인크레티나 아이가 <b>14시간을 선택한 이유</b>는 효과는 충분하면서 안전한 황금 구간이기 때문입니다.</p>
<p><b>α×γ 동시 리셋</b>: 14h 단식 해제는 α(타이밍)와 γ(수용체 민감도)를 동시에 개선하는 유일한 루틴. 그래서 IMEM 점수에 +7XP가 부여됩니다.</p>`,
    refs:'Anton SD et al. (Obesity 2018, IF와 대사 스위치); Mattson MP et al. (NEJM 2019, 단식의 메커니즘); Sutton EF et al. (Cell Metab 2018, eTRF와 인슐린 감수성); Cabo R et al. (Cell 2014, autophagy와 노화).'},

// ═══ 약자 사전 — 본문 안에서 자동으로 하단에 풀네임 표시 ═══
const ABBR_GLOSSARY = {
  'EVOO':   '엑스트라 버진 올리브오일',
  'WPI':    '분리 유청 단백질 (Whey Protein Isolate)',
  'PHGG':   '부분 가수분해 구아검',
  'SCFA':   '단쇄지방산 (Short-Chain Fatty Acid)',
  'GLUT-4': '글루코스 수송체 4',
  'AMPK':   'AMP-activated Protein Kinase',
  'MUFA':   '단일불포화지방산',
  'DHA':    'Docosahexaenoic Acid (오메가-3)',
  'EPA':    'Eicosapentaenoic Acid (오메가-3)',
  'ALA':    'Alpha-Linolenic Acid (오메가-3)',
  'CCK':    'Cholecystokinin (콜레시스토키닌)',
  'GI':     'Glycemic Index (혈당지수)',
  'ORAC':   'Oxygen Radical Absorbance Capacity',
  'NEJM':   'New England Journal of Medicine',
  'PNAS':   'Proceedings of the National Academy of Sciences',
  'PMC':    'PubMed Central',
};
// 긴 약자부터 매칭 (예: GLUT-4가 G보다 먼저)
const ABBR_KEYS = Object.keys(ABBR_GLOSSARY).sort(function(a,b){return b.length-a.length;});

function expandAbbrInElement(root){
  if (!root) return;
  try {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    const targets = [];
    let n;
    while (n = walker.nextNode()) {
      // ruby/rt 안의 텍스트는 재처리 안 함
      const tag = n.parentNode && n.parentNode.tagName;
      if (tag === 'RT' || tag === 'RUBY' || tag === 'SCRIPT' || tag === 'STYLE') continue;
      targets.push(n);
    }
    for (const tn of targets) {
      let html = tn.nodeValue;
      let changed = false;
      for (const abbr of ABBR_KEYS) {
        // 약자 양옆이 알파/숫자/하이픈이 아닐 때만 매칭 (단어 경계)
        const escaped = abbr.replace(/[-[\]{}()*+?.\\^$|]/g, '\\$&');
        const re = new RegExp('(^|[^A-Za-z0-9\\-])(' + escaped + ')(?![A-Za-z0-9\\-])', 'g');
        if (re.test(html)) {
          html = html.replace(re, function(_m, pre, match){
            return pre + '<ruby class="abbr">' + match + '<rp>(</rp><rt>' + ABBR_GLOSSARY[abbr] + '</rt><rp>)</rp></ruby>';
          });
          changed = true;
        }
      }
      if (changed) {
        const span = document.createElement('span');
        span.innerHTML = html;
        tn.parentNode.replaceChild(span, tn);
      }
    }
  } catch(e) { console.warn('[abbr] expand failed:', e); }
}

function renderPreload(){
  const list = preloadFilter === 'all' ? RECIPES : RECIPES.filter(r=>r.cat===preloadFilter);
  const grid = document.getElementById('preload-list');
  if (list.length === 0) { grid.innerHTML = '<div class="empty"><div class="empty-emoji">🍳</div><div class="empty-text">해당 카테고리에 레시피가 없어요</div></div>'; return; }
  grid.innerHTML = list.map(r=>`
    <div class="rcard fade-in" onclick="showDetail('preload',${r.id})">
      <div class="rcard-emoji">${r.emoji}</div>
      <div class="rcard-body">
        <div class="rcard-name">#${r.id} ${escapeHtml(r.name)}</div>
        <div class="rcard-sub">${escapeHtml(r.sub)}</div>
        <div class="rcard-stats">
          <span class="rstat">⏱ ${r.time}</span>
          <span class="rstat">🔥 ${r.cal}kcal</span>
          <span class="rstat rstat-p">💪 ${r.p}g</span>
          <span class="rstat rstat-glp">${stars(r.glp)}</span>
        </div>
      </div>
    </div>`).join('');
  expandAbbrInElement(grid);
}

function renderBseq(){
  const list = bseqFilter === 'all' ? BSEQ : BSEQ.filter(b=>b.type===bseqFilter);
  const grid = document.getElementById('bseq-list');
  grid.innerHTML = list.map(b=>`
    <div class="rcard fade-in" onclick="showDetail('bseq',${b.id})">
      <div class="rcard-emoji">${b.emoji}</div>
      <div class="rcard-body">
        <div class="rcard-name">${escapeHtml(b.name)}</div>
        <div class="rcard-sub">${escapeHtml(b.sub)}</div>
        <div class="rcard-stats">
          <span class="rstat">${b.type==='home'?'🏠 집밥':'🏪 외식'}</span>
          <span class="rstat rstat-glp">β_seq ${b.beta}</span>
          <span class="rstat">${b.seq.length}단계</span>
        </div>
      </div>
    </div>`).join('');
  expandAbbrInElement(grid);
}

function renderScience(){
  const grid = document.getElementById('science-list');
  grid.innerHTML = SCIENCE.map(s=>`
    <div class="rcard fade-in" onclick="showDetail('science',${s.id})">
      <div class="rcard-emoji">${s.emoji}</div>
      <div class="rcard-body">
        <div class="rcard-name">${escapeHtml(s.name)}</div>
        <div class="rcard-sub">${escapeHtml(s.sub)}</div>
      </div>
    </div>`).join('');
  expandAbbrInElement(grid);
}

function goTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(el=>el.classList.toggle('active', el.id==='panel-'+tab));
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('footer-bar').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function setPreloadFilter(cat){
  preloadFilter = cat;
  document.querySelectorAll('#preload-filters .filter').forEach(el=>el.classList.toggle('active', el.dataset.cat===cat));
  renderPreload();
}
function setBseqFilter(cat){
  bseqFilter = cat;
  document.querySelectorAll('#bseq-filters .filter').forEach(el=>el.classList.toggle('active', el.dataset.cat===cat));
  renderBseq();
}

function showDetail(type, id){
  let html = '';
  if (type==='preload') {
    const r = RECIPES.find(x=>x.id===id); if (!r) return;
    html = `
      <button class="back-btn" onclick="goTab('preload')" style="margin-bottom:14px;width:auto;padding:8px 16px;border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;gap:6px"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:none;stroke:currentColor;stroke-width:2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg> 목록으로</button>
      <div class="detail-header">
        <div class="detail-emoji">${r.emoji}</div>
        <div class="detail-title">
          <h2>#${r.id} ${escapeHtml(r.name)}</h2>
          <p>${escapeHtml(r.sub)}</p>
        </div>
      </div>
      <div class="detail-stats">
        <span class="dstat">⏱ ${r.time}</span>
        <span class="dstat">🔥 ${r.cal} kcal</span>
        <span class="dstat">💪 단백질 ${r.p}g</span>
        <span class="dstat" style="color:var(--gold);letter-spacing:1px">${stars(r.glp)} GLP-1</span>
      </div>
      <div class="detail-section">
        <div class="ds-label">📝 재료</div>
        <div class="ds-text">${escapeHtml(r.ing)}</div>
      </div>
      <div class="detail-section">
        <div class="ds-label">👨‍🍳 만들기</div>
        <div class="ds-text">${escapeHtml(r.steps)}</div>
      </div>
      <div class="detail-section" style="background:linear-gradient(135deg,rgba(196,154,60,.08),rgba(196,154,60,.02));border-color:var(--gold)">
        <div class="ds-label" style="color:var(--gold)">🔬 과학적 근거</div>
        <div class="ds-text">${escapeHtml(r.sci)}</div>
      </div>`;
  } else if (type==='bseq') {
    const b = BSEQ.find(x=>x.id===id); if (!b) return;
    html = `
      <button class="back-btn" onclick="goTab('bseq')" style="margin-bottom:14px;width:auto;padding:8px 16px;border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;gap:6px"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:none;stroke:currentColor;stroke-width:2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg> 목록으로</button>
      <div class="detail-header">
        <div class="detail-emoji">${b.emoji}</div>
        <div class="detail-title">
          <h2>${escapeHtml(b.name)}</h2>
          <p>${escapeHtml(b.sub)}</p>
        </div>
      </div>
      <div class="detail-stats">
        <span class="dstat">${b.type==='home'?'🏠 집밥':'🏪 외식'}</span>
        <span class="dstat beta">β_seq = ${b.beta}</span>
        <span class="dstat">${b.seq.length}단계</span>
      </div>
      <div class="detail-section">
        <div class="ds-label">🥢 추천 순서 (탭하여 완료 체크)</div>
        <div class="seq-steps">
          ${b.seq.map((s,i)=>`
            <div class="seq-step" onclick="this.classList.toggle('done')">
              <div class="seq-num">${s.step}</div>
              <div class="seq-step-body">
                <div class="seq-label">${s.icon} ${escapeHtml(s.label)}</div>
                <div class="seq-desc">${escapeHtml(s.desc)}</div>
                <span class="seq-imem">${escapeHtml(s.imem)}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="detail-section" style="background:linear-gradient(135deg,rgba(26,107,104,.05),transparent);border-color:var(--teal)">
        <div class="ds-label" style="color:var(--teal)">💡 실전 팁</div>
        <div class="ds-text">${escapeHtml(b.tip)}</div>
      </div>
      <div class="detail-section" style="background:linear-gradient(135deg,rgba(196,154,60,.08),rgba(196,154,60,.02));border-color:var(--gold)">
        <div class="ds-label" style="color:var(--gold)">🔬 과학적 근거</div>
        <div class="ds-text">${escapeHtml(b.sci)}</div>
      </div>`;
  } else if (type==='science') {
    const s = SCIENCE.find(x=>x.id===id); if (!s) return;
    html = `
      <button class="back-btn" onclick="goTab('science')" style="margin-bottom:14px;width:auto;padding:8px 16px;border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;gap:6px"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:none;stroke:currentColor;stroke-width:2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg> 목록으로</button>
      <div class="detail-header">
        <div class="detail-emoji">${s.emoji}</div>
        <div class="detail-title">
          <h2>${escapeHtml(s.name)}</h2>
          <p>${escapeHtml(s.sub)}</p>
        </div>
      </div>
      <div class="detail-section">
        <div class="ds-label">📖 본문</div>
        <div class="ds-text">${s.body}</div>
      </div>
      <div class="detail-section" style="background:var(--surface-2);border-color:var(--line)">
        <div class="ds-label">📚 참고문헌</div>
        <div class="ds-text" style="font-size:12px;color:var(--muted);font-style:italic">${escapeHtml(s.refs)}</div>
      </div>`;
  }
  const dv = document.getElementById('detail-view');
  dv.innerHTML = html;
  expandAbbrInElement(dv);
  dv.classList.add('active','fade-in');
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('footer-bar').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

// 헤더 스크롤 그림자
window.addEventListener('scroll', function(){
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 8);
}, {passive:true});

// 초기 렌더
renderPreload();
renderBseq();
renderScience();
</script>
</body>
</html>
